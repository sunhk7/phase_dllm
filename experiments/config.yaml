experiment:
  name: llada_spatiotemporal_dynamics
  seed: 42

paths:
  results_dir: results

model:
  model_id: GSAI-ML/LLaDA-8B-Instruct
  trust_remote_code: true

dummy:
  enabled: true
  tokenizer: GSAI-ML/LLaDA-8B-Instruct
  steps: 10
  gen_length: 32
  block_length: 16
  local_half_window: 32
  device: auto
  output_npy: results/dummy_dynamics.npy
  output_png: results/dummy_dynamics.png

real:
  enabled: true
  dataset: gsm8k
  split: test
  max_samples: 100
  batch_size: 1
  steps: 128
  gen_length: 128
  block_length: 32
  temperature: 0.0
  cfg_scale: 0.0
  local_half_window: 32
  remasking: low_confidence
  device: auto
  heatmap_title_prefix: GSM8K Attention Dynamics

prompt:
  enabled: true
  batch_size: 1
  steps: 128
  gen_length: 128
  block_length: 32
  temperature: 0.0
  cfg_scale: 0.0
  local_half_window: 32
  remasking: low_confidence
  device: auto
  heatmap_title_prefix: Prompt Attention Dynamics
